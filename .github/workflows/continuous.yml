name: continuous
on: pull_request
jobs:
  build:
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: mymindstorm/setup-emsdk@v16
        with:
          version: "3.1.35"
      - run: emcc -v
      - run: cmake --version
      - run: cmake -B builds -DCLOSURE=1 "-DCMAKE_POLICY_VERSION_MINIMUM=3.5" ${{ matrix.cmake-args }}
      - run: cmake --build builds -- VERBOSE=1
      - run: npm ci
      - name: Test Ammo Javascript
        run: npx ava
        env:
          AMMO_PATH: builds/ammo.js
      - name: Test Ammo WebAssembly
        run: npx ava
        env:
          AMMO_PATH: builds/ammo.wasm.js
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        include:
          - os: windows-latest
            cmake-args: -G 'MinGW Makefiles'
