name: Build Ammo.js with ALLOW_MEMORY_GROWTH=1

on:
  workflow_dispatch:     # 手动触发（推荐）
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      # 官方 CI 用的就是这个 action + 3.1.35 版本（最稳定）
      - uses: mymindstorm/setup-emsdk@v16
        with:
          version: "3.1.35"

      - run: emcc -v
      - run: cmake --version

      - name: Configure with Memory Growth
        run: |
          cmake -B builds \
            -DCLOSURE=1 \
            "-DCMAKE_POLICY_VERSION_MINIMUM=3.5" \
            -DALLOW_MEMORY_GROWTH=1 \
            -DTOTAL_MEMORY=134217728

      - name: Build
        run: cmake --build builds -- VERBOSE=1

      - name: Upload built files
        uses: actions/upload-artifact@v4
        with:
          name: ammo-with-allow-memory-growth
          path: builds/
          retention-days: 30
